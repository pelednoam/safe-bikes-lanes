name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch map data (published as a release tarball, not committed to git)
        run: |
          for i in 1 2 3 4 5; do
            curl -sL --fail -o web-data.tar.gz \
              https://github.com/${{ github.repository }}/releases/download/data-snapshot/web-data.tar.gz \
              && break
            echo "data tarball not available yet (attempt $i) — retrying in 15s"
            sleep 15
          done
          if [ ! -f web-data.tar.gz ]; then
            echo "::error::map data tarball not found — run scripts/publish-data.sh"; exit 1
          fi
          tar xzf web-data.tar.gz -C web
          echo "extracted $(ls web/data/tiles/*.json | grep -vc manifest) routing tiles, $(ls web/data/nettiles/*.json | grep -vc manifest) network tiles"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web
      - name: Type-check, test, build
        run: npm run check && npm test && npm run build
        working-directory: web
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: web
      - name: Browser E2E (real app + graph)
        run: npm run e2e
        working-directory: web
      - name: Assemble site
        run: |
          mkdir _site
          cp web/index.html web/*.js _site/
          cp web/manifest.json web/icon-192.png web/icon-512.png _site/
          cp -r web/data _site/data
      - name: Mirror latest APK + version manifest
        run: |
          mkdir -p _site/app
          for i in 1 2 3 4 5; do
            curl -sL --fail -o _site/app/family-bike-router.apk \
              https://github.com/${{ github.repository }}/releases/latest/download/family-bike-router.apk \
              && break
            echo "APK not available yet (attempt $i) — retrying in 20s"
            sleep 20
          done
          [ -f _site/app/family-bike-router.apk ] || echo "no release yet — skipping APK mirror"
          # The releases/latest API lags the download redirect under GitHub's
          # eventual consistency, so retry rather than silently skip
          # version.json (a miss breaks the in-app updater).
          TAG=""
          for i in 1 2 3 4 5; do
            TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
            [ "$TAG" != "null" ] && [ -n "$TAG" ] && break
            echo "release tag not resolved yet (attempt $i) — retrying in 15s"
            sleep 15
          done
          if [ "$TAG" != "null" ] && [ -n "$TAG" ]; then
            printf '{"version": "%s"}\n' "$TAG" > _site/app/version.json
          else
            echo "::warning::could not resolve latest release tag — version.json not written"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
