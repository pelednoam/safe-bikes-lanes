name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web
      - name: Type-check, test, build
        run: npm run check && npm test && npm run build
        working-directory: web
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: web
      - name: Browser E2E (real app + graph)
        run: npm run e2e
        working-directory: web
      - name: Assemble site
        run: |
          mkdir _site
          cp web/index.html web/*.js _site/
          cp web/manifest.json web/icon-192.png web/icon-512.png _site/
          cp -r web/data _site/data
      - name: Mirror latest APK + version manifest
        run: |
          mkdir -p _site/app
          curl -sL --fail -o _site/app/family-bike-router.apk \
            https://github.com/${{ github.repository }}/releases/latest/download/family-bike-router.apk \
            || echo "no release yet — skipping APK mirror"
          TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          if [ "$TAG" != "null" ] && [ -n "$TAG" ]; then
            printf '{"version": "%s"}\n' "$TAG" > _site/app/version.json
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
