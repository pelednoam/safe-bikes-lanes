name: Refresh data sources

# Weekly: re-pull all sources (city GIS, MassDOT, crashes, OSM, POIs,
# terrain), rebuild the graph, re-export web data, and push if anything
# changed — the push triggers the Pages deploy. The commit body carries the
# diff stat so new-lane changes are visible in history.
on:
  schedule:
    - cron: "0 6 * * 1"  # weekly (Mondays) — construction data moves fast
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install osmnx geopandas networkx shapely pillow
      - name: Refresh all sources
        working-directory: pipeline
        env:
          MASSDOT_WZDX_API_KEY: ${{ secrets.MASSDOT_WZDX_API_KEY }}
        run: python fetch.py --refresh
      - name: Rebuild graph
        working-directory: pipeline
        run: python build_graph.py
      - name: Export web data
        working-directory: pipeline
        run: python export_web.py
      - name: Cache aerial + terrain tiles
        uses: actions/cache@v4
        with:
          path: |
            data/raw/aerial
            data/raw/terrain
          key: tiles-v1-${{ github.run_id }}
          restore-keys: tiles-v1-
      - name: Aerial lane audit (full network)
        working-directory: pipeline
        run: python aerial_audit.py --max-sites 2767
      - name: Rebuild review page
        working-directory: pipeline
        run: python review_page.py
      - name: Publish data tarball + deploy
        # web/data is NOT committed to git (it would bloat history ~200 MB per
        # refresh). Publish it as a release asset the Pages deploy downloads.
        run: |
          tar czf web-data.tar.gz -C web --exclude=data/keys.json data
          gh release view data-snapshot >/dev/null 2>&1 || gh release create data-snapshot \
            --latest=false --prerelease \
            -t "Map data snapshot" \
            -n "Generated web/data (routing + network tiles + map layers), published outside git history."
          gh release upload data-snapshot web-data.tar.gz --clobber
          gh workflow run pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
